name: Deploy to Production

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/dinq-labs/dinq-connector
  DEPLOYMENT: dinq-connector
  NAMESPACE: dinq

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        run: |
          TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build --platform linux/amd64 -t "$IMAGE:$TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Deploy to K8s
        run: |
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl set image "deployment/$DEPLOYMENT" "$DEPLOYMENT=$IMAGE:$TAG" -n "$NAMESPACE"
          kubectl rollout status "deployment/$DEPLOYMENT" -n "$NAMESPACE" --timeout=300s
